name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      # PyGObject (gi) is used from the system package because it links against
      # the system GTK libraries. Tests therefore run on the runner's system
      # python3, the interpreter python3-gi is built for. Mixing apt's gi with an
      # actions/setup-python interpreter breaks with an ABI mismatch (_gi import).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0

      - name: Install Python tooling
        run: |
          python3 -m pip install --break-system-packages --upgrade flake8 mypy pytest

      - name: Lint with flake8
        run: flake8 youtubeaudiodownloader/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Type check with mypy
        run: mypy youtubeaudiodownloader/ --ignore-missing-imports --no-strict-optional

      - name: Run tests
        run: pytest tests/ -v
